name: Release

# Cut a release when a version tag is pushed, e.g.:
#   git tag v1.0.0 && git push origin v1.0.0
# Builds a SIGNED APK + AAB and attaches them to a GitHub Release.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # needed to create the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x gradlew

      # Recreate the signing material from encrypted repository secrets.
      # Nothing sensitive is ever stored in the repository.
      - name: Restore keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::Signing secrets are not configured. Add KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > upload-keystore.jks
          cat > keystore.properties <<EOF
          storeFile=upload-keystore.jks
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Build signed release APK + AAB
        run: ./gradlew assembleRelease bundleRelease --no-daemon --stacktrace

      - name: Stage artifacts
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/app-release.apk "dist/ScreenMirror-${GITHUB_REF_NAME}.apk"
          cp app/build/outputs/bundle/release/app-release.aab "dist/ScreenMirror-${GITHUB_REF_NAME}.aab"

      - name: Clean up signing material
        if: always()
        run: rm -f upload-keystore.jks keystore.properties

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.apk
            dist/*.aab
          generate_release_notes: true
          fail_on_unmatched_files: true
